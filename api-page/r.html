<!-- Theme Color (Mobile Browser) -->
<meta name="theme-color" content="#0f172a">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        :root { --primary: #FF4500; --dark: #121212; --light: #FFFFFF; --gray: #F4F4F7; --ease: cubic-bezier(0.23, 1, 0.32, 1); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--light); color: var(--dark); line-height: 1.6; overflow-x: hidden; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .navbar { position: fixed; top: 0; width: 100%; height: 70px; background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.05); z-index: 1000; display: flex; align-items: center; padding: 0 30px; }
        .logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 18px; color: var(--dark); text-decoration: none; }
        .hero { padding: 140px 20px 40px; text-align: center; animation: slideUp 0.8s var(--ease); }
        .hero h1 { font-size: clamp(32px, 8vw, 56px); font-weight: 800; letter-spacing: -1.5px; margin-bottom: 10px; }
        .hero p { color: #666; font-size: 16px; max-width: 500px; margin: 0 auto; }
        .container { max-width: 700px; margin: 0 auto 100px; padding: 0 20px; animation: scaleIn 1s var(--ease); }
        .card { background: var(--gray); border-radius: 32px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.02); }
        .field { margin-bottom: 25px; }
        .field label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 10px; color: #444; margin-left: 5px; }
        .input { width: 100%; background: #FFF; border: 2px solid transparent; border-radius: 20px; padding: 18px 25px; font-family: inherit; font-size: 15px; font-weight: 500; transition: all 0.3s var(--ease); box-shadow: 0 4px 10px rgba(0,0,0,0.01); }
        .input:focus { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 10px 25px rgba(255, 69, 0, 0.1); }
        textarea.input { min-height: 200px; line-height: 1.7; resize: none; scrollbar-width: none; }
        .btn { width: 100%; height: 65px; background: var(--dark); color: #FFF; border: none; border-radius: 22px; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; transition: all 0.4s var(--ease); }
        .btn:hover { background: var(--primary); transform: translateY(-3px); box-shadow: 0 15px 30px rgba(255, 69, 0, 0.2); }
        .btn:active { transform: scale(0.98); }
        .log-area { margin-top: 30px; background: #1a1a1d; border-radius: 24px; padding: 25px; display: none; animation: slideUp 0.5s var(--ease); }
        .log-area pre { color: #00ff88; font-family: 'JetBrains Mono', monospace; font-size: 12px; white-space: pre-wrap; word-break: break-all; }
        .toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(100px); background: #111; color: #FFF; padding: 20px 40px; border-radius: 100px; font-weight: 600; font-size: 14px; z-index: 2000; box-shadow: 0 20px 40px rgba(0,0,0,0.15); transition: 0.6s var(--ease); }
        .toast.show { transform: translateX(-50%) translateY(0); }
        @media (max-width: 500px) { .card { padding: 25px; border-radius: 24px; } .hero h1 { font-size: 36px; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#" class="logo">
            <i class="material-icons" style="color:var(--primary)">bolt</i>
            XTE ID
        </a>
    </nav>

    <header class="hero">
        <h1>Kirim Request.</h1>
        <p>Tulis apa yang kamu butuhkan, tim kami akan segera mengeceknya secepat mungkin.</p>
    </header>

    <div class="container">
        <div class="card">
            <form id="mainForm" onsubmit="return false">
                <div class="field">
                    <label>Nama Kamu</label>
                    <input type="text" id="uName" class="input" placeholder="Siapa nama kamu?" required>
                </div>
                <div class="field">
                    <label>Nama Endpoint</label>
                    <input type="text" id="fName" class="input" placeholder="Contoh: TikTok" required>
                </div>
                <div class="field">
                    <label>Detail Request</label>
                    <textarea id="fDetail" class="input" placeholder="Tulis detailnya di sini..." required></textarea>
                </div>
                <button type="submit" class="btn" id="btnAction" onclick="handleKirim()">
                    <i class="material-icons">send</i>
                    Kirim Sekarang
                </button>
            </form>

            <div class="log-area" id="logBox">
                <pre id="logText"></pre>
            </div>
        </div>
    </div>

    <div id="notif" class="toast">Berhasil mengirim request! 🔥</div>

    <script>
        async function handleKirim() {
            const user = document.getElementById('uName').value;
            const feature = document.getElementById('fName').value;
            const detail = document.getElementById('fDetail').value;
            const log = document.getElementById('logText');
            const box = document.getElementById('logBox');
            const btn = document.getElementById('btnAction');

            if(!user || !feature || !detail) return;

            btn.disabled = true;
            btn.innerHTML = `<i class="material-icons">hourglass_empty</i> Tunggu sebentar...`;
            
            box.style.display = 'block';
            log.textContent = `> Menghubungkan ke server...\n`;

            setTimeout(() => {
                log.textContent += `> Mengecek data dari ${user}...\n`;
                log.textContent += `> Ukuran data: ${detail.length} karakter.\n`;
                log.textContent += `> Sedang mengirim fitur: ${feature}...\n`;
            }, 600);

            try {
                const response = await fetch('/api/request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user, feature, detail })
                });

                if(response.ok) {
                    log.textContent += `> Selesai! Request kamu sudah masuk ke antrean.`;
                    showNotif();
                } else {
                    throw new Error();
                }
            } catch (err) {
                log.textContent += `> Data terkirim ke sistem XTE ID.\n`;
                log.textContent += `> Terima kasih, ${user}! Tunggu kabar dari kami.`;
                showNotif();
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i class="material-icons">done_all</i> Terkirim!`;
                setTimeout(() => {
                    btn.innerHTML = `<i class="material-icons">send</i> Kirim Lagi`;
                }, 3000);
            }
        }

        function showNotif() {
            const n = document.getElementById('notif');
            n.classList.add('show');
            setTimeout(() => n.classList.remove('show'), 4000);
        }
    </script>
</body>
</html>
